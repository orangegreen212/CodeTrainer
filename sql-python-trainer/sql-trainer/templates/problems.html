<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tasks - SQL & Python Trainer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5XW9HB7D');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5XW9HB7D"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div class="container">
        <!-- Language Switcher -->
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="uk">UK</button>
        </div>
        
        <header>
            <h1><a href="/">
                <svg class="icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M9 11l3 3L22 4" stroke-width="2" stroke-linecap="round"/>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke-width="2"/>
                </svg>
                SQL & Python Trainer
            </a></h1>
        </header>
        
        <main>
            <div class="problems-header">
                <h2><span data-i18n="problems.title">All Tasks</span> ({{ problems|length }})</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all" data-i18n="problems.filter.all">All</button>
                    <button class="filter-btn" data-filter="SQL" data-i18n="problems.filter.sql">SQL</button>
                    <button class="filter-btn" data-filter="PYTHON" data-i18n="problems.filter.python">Python</button>
                </div>
            </div>
            
            <div class="problems-table">
                <table>
                    <thead>
                        <tr>
                            <th data-i18n="problems.th.number">#</th>
                            <th data-i18n="problems.th.title">Title</th>
                            <th data-i18n="problems.th.category">Category</th>
                            <th data-i18n="problems.th.difficulty">Difficulty</th>
                            <th data-i18n="problems.th.status">Status</th>
                            <th data-i18n="problems.th.action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="problems-list">
                        {% for problem in problems %}
                        <tr class="problem-row" data-type="{{ problem.type }}" data-id="{{ problem.id }}">
                            <td>{{ problem.id }}</td>
                            <td class="problem-title" data-en="{{ problem.title.en }}" data-uk="{{ problem.title.uk }}">
                                {{ problem.title.en }}
                            </td>
                            <td>
                                <span class="badge badge-category">{{ problem.category }}</span>
                            </td>
                            <td>
                                <span class="badge-difficulty badge-{{ problem.difficulty.lower() }}">{{ problem.difficulty }}</span>
                            </td>
                            <td>
                                <span class="status-badge" data-i18n="problems.status.not_started">Start</span>
                            </td>
                            <td>
                                <a href="/problem/{{ problem.id }}" class="btn-solve" data-i18n="problems.action.solve">Solve →</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        // Filter functionality
        const filterButtons = document.querySelectorAll('.filter-btn');
        const problemRows = document.querySelectorAll('.problem-row');
        
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filter = btn.dataset.filter;
                
                problemRows.forEach(row => {
                    if (filter === 'all' || row.dataset.type === filter) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });
        });
        
        // Update problem titles based on language
        function updateProblemTitles() {
            const lang = window.i18n.getCurrentLang();
            document.querySelectorAll('.problem-title').forEach(title => {
                const text = title.getAttribute('data-' + lang);
                if (text) title.textContent = text;
            });
        }
        
        // Listen for language changes
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setTimeout(updateProblemTitles, 100);
            });
        });
        
        // Initial update
        updateProblemTitles();
    </script>
</body>
</html>
