<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачи - SQL & Python Trainer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">🎯 SQL & Python Trainer</a></h1>
        </header>
        
        <main>
            <div class="problems-header">
                <h2>Все задачи ({{ problems|length }})</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="SQL Junior">SQL Junior</button>
                    <button class="filter-btn" data-filter="SQL Middle">SQL Middle</button>
                    <button class="filter-btn" data-filter="Python Junior">Python Junior</button>
                    <button class="filter-btn" data-filter="Python ML">Python ML</button>
                </div>
            </div>
            
            <div class="problems-table">
                <table>
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>Название</th>
                            <th>Категория</th>
                            <th>Сложность</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="problems-list">
                        {% for problem in problems %}
                        <tr class="problem-row" data-category="{{ problem.category }}">
                            <td>{{ problem.id }}</td>
                            <td class="problem-title">{{ problem.title }}</td>
                            <td>
                                <span class="badge badge-category-{{ problem.category|replace(' ', '-')|lower }}">
                                    {{ problem.category }}
                                </span>
                            </td>
                            <td>
                                <span class="badge-difficulty badge-{{ problem.difficulty.lower() }}">
                                    {{ problem.difficulty }}
                                </span>
                            </td>
                            <td>
                                <a href="/problem/{{ problem.id }}" class="btn-solve">Решать →</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script>
        // Filter functionality
        const filterButtons = document.querySelectorAll('.filter-btn');
        const problemRows = document.querySelectorAll('.problem-row');
        
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active button
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filter = btn.dataset.filter;
                
                // Filter problems
                problemRows.forEach(row => {
                    if (filter === 'all' || row.dataset.category === filter) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
