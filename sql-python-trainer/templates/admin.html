<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SQL & Python Trainer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg class="icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4" stroke-width="2"/>
                </svg>
                Admin Panel
            </h1>
            <p class="subtitle">Add New Problems to Database</p>
        </header>
        
        <main>
            <div class="admin-form-container">
                <form id="add-problem-form" class="admin-form">
                    <h3>Add New Problem</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Title (EN)</label>
                            <input type="text" name="title_en" required placeholder="e.g., Calculate DAU">
                        </div>
                        <div class="form-group">
                            <label>Title (UK)</label>
                            <input type="text" name="title_uk" required placeholder="e.g., Розрахуйте DAU">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Description (EN)</label>
                            <textarea name="description_en" required rows="3" placeholder="Problem description in English"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Description (UK)</label>
                            <textarea name="description_uk" required rows="3" placeholder="Опис задачі українською"></textarea>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <select name="category" required>
                                {% for category in categories %}
                                <option value="{{ category }}">{{ category }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Difficulty</label>
                            <select name="difficulty" required>
                                <option value="Easy">Easy</option>
                                <option value="Medium">Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select name="problem_type" required>
                                <option value="SQL">SQL</option>
                                <option value="PYTHON">Python</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Tables (comma-separated)</label>
                        <input type="text" name="tables" placeholder="e.g., users, events, orders">
                    </div>
                    
                    <div class="form-group">
                        <label>Solution Code</label>
                        <textarea name="solution" rows="6" placeholder="SELECT * FROM users;" style="font-family: monospace;"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Hint (EN)</label>
                            <input type="text" name="hint_en" placeholder="Use GROUP BY...">
                        </div>
                        <div class="form-group">
                            <label>Hint (UK)</label>
                            <input type="text" name="hint_uk" placeholder="Використайте GROUP BY...">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Admin Password</label>
                        <input type="password" name="password" required placeholder="Enter admin password">
                    </div>
                    
                    <button type="submit" class="btn-primary">Add Problem</button>
                </form>
                
                <div id="form-message" class="form-message" style="display: none;"></div>
            </div>
        </main>
    </div>
    
    <script>
        document.getElementById('add-problem-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const messageDiv = document.getElementById('form-message');
            
            try {
                const response = await fetch('/admin/add-problem', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.className = 'form-message success';
                    messageDiv.textContent = `Success! Problem #${result.problem_id} added.`;
                    messageDiv.style.display = 'block';
                    e.target.reset();
                    
                    setTimeout(() => {
                        messageDiv.style.display = 'none';
                    }, 5000);
                } else {
                    messageDiv.className = 'form-message error';
                    messageDiv.textContent = `Error: ${result.error}`;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'form-message error';
                messageDiv.textContent = `Error: ${error.message}`;
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
