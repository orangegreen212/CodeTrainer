<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes - SQL & Python Trainer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    
    <!-- GTM -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5XW9HB7D');</script>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5XW9HB7D"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    
    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="uk">UK</button>
        </div>
        
        <header>
            <h1><a href="/">
                <svg class="icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="10" stroke-width="2"/>
                    <path d="M12 16v-4M12 8h.01" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span data-i18n="quizzes.title">Knowledge Quizzes</span>
            </a></h1>
            <p class="subtitle" data-i18n="quizzes.subtitle">Test your SQL & Python knowledge</p>
        </header>
        
        <main>
            <div class="quizzes-container">
                {% for quiz in quizzes %}
                <div class="quiz-card" data-quiz-id="{{ quiz.id }}">
                    <h3 id="question-{{ quiz.id }}" class="quiz-question">{{ quiz.question.en }}</h3>
                    
                    <div class="quiz-options">
                        {% for i in range(quiz.options|length) %}
                        <label class="quiz-option">
                            <input type="radio" name="quiz-{{ quiz.id }}" value="{{ i }}" data-quiz="{{ quiz.id }}">
                            <span class="option-text">{{ quiz.options[i] }}</span>
                            <span class="option-indicator"></span>
                        </label>
                        {% endfor %}
                    </div>
                    
                    <button class="btn-check-answer" data-quiz-id="{{ quiz.id }}" data-correct="{{ quiz.correct }}">
                        <span data-i18n="quizzes.check">Check Answer</span>
                    </button>
                    
                    <div class="quiz-feedback" id="feedback-{{ quiz.id }}" style="display: none;">
                        <p class="explanation" id="explanation-{{ quiz.id }}">{{ quiz.explanation.en }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
            
            <div class="quiz-score">
                <h3 data-i18n="quizzes.score">Your Score:</h3>
                <div class="score-display">
                    <span id="correct-count">0</span> / <span id="total-count">{{ quizzes|length }}</span>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/i18n.js"></script>
    <script>
        const quizzesData = {{ quizzes | tojson }};
        let correctCount = 0;
        let totalAnswered = 0;
        
        // Check answer buttons
        document.querySelectorAll('.btn-check-answer').forEach(btn => {
            btn.addEventListener('click', () => {
                const quizId = btn.dataset.quizId;
                const correctAnswer = parseInt(btn.dataset.correct);
                const selected = document.querySelector(`input[name="quiz-${quizId}"]:checked`);
                
                if (!selected) {
                    alert(window.i18n.t('quizzes.select_answer') || 'Please select an answer');
                    return;
                }
                
                const selectedValue = parseInt(selected.value);
                const feedback = document.getElementById(`feedback-${quizId}`);
                const quizCard = selected.closest('.quiz-card');
                
                // Disable further selections
                document.querySelectorAll(`input[name="quiz-${quizId}"]`).forEach(input => {
                    input.disabled = true;
                });
                btn.disabled = true;
                
                // Show feedback
                if (selectedValue === correctAnswer) {
                    feedback.className = 'quiz-feedback correct';
                    feedback.innerHTML = '<p class="feedback-title">✓ Correct!</p><p class="explanation" id="explanation-' + quizId + '"></p>';
                    correctCount++;
                    
                    // Track in GTM
                    if (window.dataLayer) {
                        window.dataLayer.push({
                            'event': 'quiz_correct',
                            'quiz_id': quizId
                        });
                    }
                } else {
                    feedback.className = 'quiz-feedback incorrect';
                    feedback.innerHTML = '<p class="feedback-title">✗ Incorrect</p><p class="explanation" id="explanation-' + quizId + '"></p>';
                    
                    if (window.dataLayer) {
                        window.dataLayer.push({
                            'event': 'quiz_incorrect',
                            'quiz_id': quizId
                        });
                    }
                }
                
                // Update explanation
                const lang = window.i18n.getCurrentLang();
                const quiz = quizzesData.find(q => q.id === quizId);
                if (quiz) {
                    document.getElementById(`explanation-${quizId}`).textContent = quiz.explanation[lang];
                }
                
                feedback.style.display = 'block';
                totalAnswered++;
                
                // Update score
                document.getElementById('correct-count').textContent = correctCount;
            });
        });
        
        // Update questions based on language
        function updateQuizLanguage() {
            const lang = window.i18n.getCurrentLang();
            quizzesData.forEach(quiz => {
                const questionEl = document.getElementById(`question-${quiz.id}`);
                if (questionEl) {
                    questionEl.textContent = quiz.question[lang];
                }
                
                const explanationEl = document.getElementById(`explanation-${quiz.id}`);
                if (explanationEl && explanationEl.textContent) {
                    explanationEl.textContent = quiz.explanation[lang];
                }
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setTimeout(updateQuizLanguage, 100);
            });
        });
    </script>
</body>
</html>
